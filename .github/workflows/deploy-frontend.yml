name: deploy frontend

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: install
        working-directory: frontend
        run: npm install --legacy-peer-deps

      - name: build (Next.js static export)
        working-directory: frontend
        env:
          NEXT_PUBLIC_SITE_URL: https://toolpulse.pages.dev
          NEXT_PUBLIC_API_URL: https://api-production-2181.up.railway.app
        run: npm run build

      - name: copy Pages Functions into export dir
        run: |
          mkdir -p frontend/out/_functions
          # functions/ is auto-detected by Pages when at the project root passed to deploy
          cp -r frontend/functions frontend/out/functions || true

      - name: deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 654f33a1338a52c1bd59916d59f95c8f
          command: pages deploy frontend/out --project-name=toolpulse --branch=main
