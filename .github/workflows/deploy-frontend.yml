name: deploy frontend

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - "content/**"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package.json

      - name: install
        working-directory: frontend
        run: npm install --legacy-peer-deps

      - name: build (Cloudflare next-on-pages)
        working-directory: frontend
        env:
          NEXT_PUBLIC_SITE_URL: https://toolpulse.pages.dev
          NEXT_PUBLIC_API_URL: https://api-production-2181.up.railway.app
        run: |
          npm run build
          npx @cloudflare/next-on-pages@1

      - name: deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 654f33a1338a52c1bd59916d59f95c8f
          command: pages deploy frontend/.vercel/output/static --project-name=toolpulse --branch=main
